<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MISSION CONTROL: Forensic Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --primary: #00f2ff;
            --secondary: #7000ff;
            --text: #e0e0e6;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 80%;
            max-width: 800px;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            letter-spacing: 5px;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        #fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .stat-label {
            font-size: 12px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 24px;
            font-family: 'JetBrains Mono', monospace;
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MISSION CONTROL</h1>
        <div style="margin-bottom: 40px;">
            <div class="pulse"></div>
            <span id="phase">INITIALIZING ENGINE...</span>
        </div>

        <div class="progress-bar">
            <div id="fill"></div>
        </div>
        <div id="percentage" style="font-size: 14px; color: var(--primary);">0%</div>

        <div class="status-grid">
            <div class="stat-card">
                <div class="stat-label">Current Book</div>
                <div id="book" class="stat-value">---</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Batch Progress</div>
                <div id="batch" class="stat-value">0 / 0</div>
            </div>
        </div>
    </div>

    <script>
        async function update() {
            try {
                const resp = await fetch('progress.json');
                if (!resp.ok) return;
                const data = await resp.json();
                
                document.getElementById('phase').textContent = data.phase.toUpperCase();
                document.getElementById('book').textContent = data.book.toUpperCase();
                document.getElementById('batch').textContent = `${data.current} / ${data.total}`;
                
                const pct = Math.round((data.current / data.total) * 100);
                document.getElementById('fill').style.width = pct + '%';
                document.getElementById('percentage').textContent = pct + '%';
                
            } catch (err) {
                console.log("Waiting for engine...");
            }
        }
        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
